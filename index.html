<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio | Minimalist & AI</title>
    <!-- TrashHand Font -->
    <link href="https://fonts.cdnfonts.com/css/trashhand" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-main: 'TrashHand', sans-serif;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --accent: #6366f1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Central Hero Image */
        .hero-figure {
            height: 85vh;
            width: auto;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            filter: contrast(1.05);
            animation: fadeIn 1.5s ease-out;
        }

        /* Navigation Links Logic */
        nav a {
            position: absolute;
            text-decoration: none;
            color: var(--text-color);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            z-index: 10;
            transition: var(--transition);
            cursor: pointer;
            line-height: 1;
            opacity: 0;
            animation: revealText 1s forwards;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a:hover {
            color: var(--accent);
            transform: scale(1.1) !important;
        }

        .ai-sparkle {
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
        }

        .ai-sparkle:hover {
            transform: rotate(20deg) scale(1.3);
        }

        /* Verbatim Placement mapping the radial style */
        .nav-video { top: 20%; left: 8%; transform: rotate(-12deg); animation-delay: 0.2s; }
        .nav-inflection { top: 8%; left: 32%; transform: rotate(2deg); animation-delay: 0.4s; }
        .nav-tour { top: 22%; right: 28%; transform: rotate(8deg); animation-delay: 0.6s; }
        .nav-music { top: 42%; right: 12%; transform: rotate(-6deg); animation-delay: 0.8s; }
        .nav-join { bottom: 22%; right: 18%; transform: rotate(4deg); animation-delay: 1s; }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(var(--rot)); }
            50% { transform: translateY(-10px) rotate(var(--rot)); }
            100% { transform: translateY(0px) rotate(var(--rot)); }
        }

        .nav-video { --rot: -12deg; animation: revealText 1s forwards 0.2s, float 4s ease-in-out infinite; }
        .nav-inflection { --rot: 2deg; animation: revealText 1s forwards 0.4s, float 3.5s ease-in-out infinite; }
        .nav-tour { --rot: 8deg; animation: revealText 1s forwards 0.6s, float 4.5s ease-in-out infinite; }
        .nav-music { --rot: -6deg; animation: revealText 1s forwards 0.8s, float 3.8s ease-in-out infinite; }
        .nav-join { --rot: 4deg; animation: revealText 1s forwards 1s, float 4.2s ease-in-out infinite; }

        @keyframes revealText {
            from { opacity: 0; transform: translateY(20px) rotate(var(--rot)); }
            to { opacity: 1; transform: translateY(0) rotate(var(--rot)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* AI Output Overlay */
        #ai-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        .ai-content {
            font-size: 2.5rem;
            max-width: 800px;
            margin-bottom: 20px;
            color: #333;
        }

        .close-btn {
            background: black;
            color: white;
            border: none;
            padding: 10px 30px;
            font-family: inherit;
            font-size: 1.5rem;
            cursor: pointer;
            margin-top: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #eee;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Social Icons */
        .socials {
            position: absolute;
            bottom: 40px;
            right: 60px;
            display: flex;
            gap: 24px;
            z-index: 20;
        }

        .socials svg { width: 20px; height: 20px; fill: currentColor; }

        @media (max-width: 768px) {
            .hero-figure { height: 50vh; }
            nav a { font-size: 1.8rem; }
            .nav-video { left: 5%; top: 25%; }
            .nav-inflection { left: 10%; top: 10%; }
            .nav-tour { right: 10%; top: 15%; }
            .nav-music { right: 5%; top: 40%; }
            .nav-join { right: 10%; bottom: 15%; }
        }
    </style>
</head>
<body>

    <!-- AI Display Overlay -->
    <div id="ai-overlay">
        <div id="ai-loader" class="loader"></div>
        <div id="ai-text" class="ai-content"></div>
        <button class="close-btn" onclick="closeAI()">RETURN</button>
    </div>

    <script>
        const apiKey = "AIzaSyBl-ZDKmfWAhCHU2IC1PwFDYjXoUpvd3E4"; // Managed by environment
        const model = "gemini-2.5-flash-preview-09-2025";
        const ttsModel = "gemini-2.5-flash-preview-tts";

        async function generateVibe(topic) {
            const overlay = document.getElementById('ai-overlay');
            const textEl = document.getElementById('ai-text');
            const loader = document.getElementById('ai-loader');
            
            overlay.style.display = 'flex';
            textEl.innerText = '';
            loader.style.display = 'block';

            const prompt = `Act as the artistic creative director for a high-fashion music artist portfolio. 
            The theme is 'Street-Couture' and 'Inflection'. 
            Generate a short, poetic 2-line lyric or vision statement for the section: ${topic.toUpperCase()}. 
            Keep it cryptic, magical, and minimalist. 15 words max. No emojis.`;

            try {
                let responseText = "";
                let attempts = 0;
                while(attempts < 5) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        responseText = data.candidates[0].content.parts[0].text;
                        break;
                    } catch (e) {
                        attempts++;
                        await new Promise(r => setTimeout(r, Math.pow(2, attempts) * 1000));
                    }
                }

                loader.style.display = 'none';
                textEl.innerText = responseText;
                
                // Trigger TTS
                speak(responseText);

            } catch (error) {
                textEl.innerText = "The signal was lost in the grain.";
                loader.style.display = 'none';
            }
        }

        async function speak(text) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${ttsModel}:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a calm, artistic whisper: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Zephyr" } } }
                        }
                    })
                });
                const data = await res.json();
                const pcmData = data.candidates[0].content.parts[0].inlineData.data;
                playWav(pcmData);
            } catch (e) {
                console.error("TTS failed", e);
            }
        }

        function playWav(base64Pcm) {
            const byteCharacters = atob(base64Pcm);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([createWavHeader(byteArray.length, 24000), byteArray], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, dataLength, true);
            return header;
        }

        function closeAI() {
            document.getElementById('ai-overlay').style.display = 'none';
        }
    </script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-main: 'TrashHand', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
            --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --accent: #6366f1;
            --star-color: #ffd700; 
        }

        /* Essential for mobile: allow scrolling but hide bars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Hero Image Logic */
        .hero-wrapper {
            position: fixed; /* Keeps image centered while scrolling nav on mobile */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 70vh;
            width: auto;
            z-index: 1; 
        }

        .hero-figure {
            height: 100%;
            width: auto;
            max-width: 90vw;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            filter: contrast(1.05) brightness(1.02);
            animation: heroReveal 2s ease-out;
        }

        /* Navigation Grid for Mobile, Absolute for Desktop */
        nav {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            box-sizing: border-box;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: var(--transition);
            text-align: center;
            animation: revealText 1.5s forwards;
            background: rgba(255,255,255,0.1); /* Better tap target visibility */
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes heroReveal { 0% { opacity: 0; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes revealText { from { opacity: 0; } to { opacity: 1; } }
        .bling { font-size: 0.5em; color: var(--star-color); }

        /* Socials & Footer */
        .socials { 
            position: relative; 
            padding: 20px 0; 
            display: flex; 
            gap: 20px; 
            z-index: 30; 
            justify-content: center;
        }
        .socials svg { width: 20px; height: 20px; fill: #000; }

        footer { 
            padding: 20px; 
            text-align: center; 
            z-index: 40; 
            font-size: 0.8rem; 
            opacity: 0.6; 
            font-family: sans-serif; 
        }

        /* Desktop Positioning (Restores your original look) */
        @media (min-width: 1024px) {
            nav { display: block; }
            nav a { position: absolute; font-size: clamp(1.8rem, 3vw, 3.5rem); animation: revealText 1.5s forwards, uniformFloat 5s ease-in-out infinite alternate; }
            .nav-video { top: 20%; left: 12%; }
            .nav-bio { top: 12%; left: 30%; } 
            .nav-inflection { top: 8%; left: 50%; transform: translateX(-50%); }
            .nav-tour { top: 20%; right: 12%; }
            .nav-merch { top: 45%; left: 8%; }
            .nav-music { top: 45%; right: 8%; }
            .nav-gallery { bottom: 22%; left: 12%; }
            .nav-join { bottom: 28%; right: 14%; }
            
            .hero-wrapper { height: 85vh; }
            .socials { position: absolute; bottom: 85px; right: 50px; }
        }

        /* Overlay Optimization for Mobile */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .portal-card {
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
        }

        .portal-title { font-size: 2.5rem; text-align: center; margin-bottom: 20px; }

        .music-grid, .merch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns on mobile */
            gap: 15px;
        }

        .tour-row {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 10px;
            text-align: center;
        }

        @media (min-width: 768px) {
            .music-grid, .merch-grid { grid-template-columns: repeat(3, 1fr); }
            .tour-row { flex-direction: row; justify-content: space-between; }
            .portal-title { font-size: 3.5rem; }
        }

        .btn-action {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
        }

        .btn-close {
            display: block;
            margin: 40px auto;
            background: none;
            border: none;
            text-decoration: underline;
            font-family: var(--font-main);
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portfolio | Inflection</title>
    <link href="https://fonts.cdnfonts.com/css/trashhand" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --font-main: 'TrashHand', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
            --transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --accent: #6366f1;
            --star-color: #ffd700; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Perfectly Centered Hero Container */
        .hero-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 85vh;
            width: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1; 
        }

        .hero-figure {
            height: 100%;
            width: auto;
            max-width: 90vw;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            filter: contrast(1.05) brightness(1.02);
            animation: heroReveal 2s ease-out;
        }

        @keyframes heroReveal {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Navigation */
        nav a {
            position: absolute;
            text-decoration: none;
            color: var(--text-color);
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            z-index: 10;
            transition: var(--transition);
            cursor: pointer;
            line-height: 1;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: revealText 1.5s forwards, uniformFloat 5s ease-in-out infinite alternate;
        }

        nav a:hover {
            color: var(--accent);
            z-index: 25;
            transform: scale(1.1) !important;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.2));
            animation-play-state: paused;
        }

        .bling { display: inline-block; font-size: 0.45em; color: var(--star-color); animation: blingScale 2.2s infinite; }
        @keyframes blingScale { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.3); opacity: 1; } }
        @keyframes uniformFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        @keyframes revealText { from { opacity: 0; } to { opacity: 1; } }

        /* Your Original Absolute Positioning */
        .nav-video { top: 20%; left: 12%; }
        .nav-bio { top: 12%; left: 30%; } 
        .nav-inflection { top: 8%; left: 50%; transform: translateX(-50%); }
        .nav-tour { top: 20%; right: 12%; }
        .nav-merch { top: 45%; left: 8%; }
        .nav-music { top: 45%; right: 8%; }
        .nav-gallery { bottom: 22%; left: 12%; }
        .nav-join { bottom: 28%; right: 14%; }

        /* Socials */
        .socials { position: absolute; bottom: 85px; right: 50px; display: flex; gap: 15px; z-index: 30; }
        .socials a { color: #000000; transition: 0.3s; display: flex; align-items: center; }
        .socials svg { width: 16px; height: 16px; fill: currentColor; }
        .socials a:hover { color: var(--accent); transform: translateY(-2px); }

        /* Footer */
        footer { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 40; font-size: 0.8rem; opacity: 0.6; }
        .footer-email { text-decoration: none; color: #000; margin-bottom: 5px; }

        /* Overlays & All Other Original CSS */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(15px);
            overflow-y: auto;
        }

        .portal-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            max-width: 900px;
            width: 95%;
            position: relative;
            animation: cardSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .portal-title { font-size: 3.5rem; color: #000; margin-bottom: 25px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .portal-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ddd; }
        .section-label { display: block; font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 10px; }

        input[type="text"], textarea { width: 100%; padding: 12px 15px; border: 1px solid #eee; border-radius: 12px; font-family: sans-serif; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; background: #f9f9f9; }
        textarea { height: 100px; resize: none; }

        .music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .album-card { text-align: center; transition: 0.4s; cursor: pointer; }
        .album-card:hover { transform: scale(1.05); }
        .album-art { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #eee; }
        .album-title { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 600; color: #111; margin: 5px 0; }

        .bio-content { font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.8; color: #1a1a1a; text-align: justify; margin-top: 10px; letter-spacing: 0.01em; max-height: 60vh; overflow-y: auto; padding-right: 15px; }
        .bio-content p { margin-bottom: 20px; }
        .bio-highlight { font-weight: 600; color: #000; }

        .merch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .merch-item { background: #fdfdfd; border: 1px solid #eee; border-radius: 16px; padding: 15px; transition: 0.3s; }
        .merch-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        .merch-img { width: 100%; aspect-ratio: 1; background: #f0f0f0; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; color: #ccc; font-family: sans-serif; font-size: 0.7rem; position: relative; }
        .sku-tag { position: absolute; top: 10px; left: 10px; background: #000; color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; }
        .merch-info h4 { margin: 0; font-family: sans-serif; font-size: 1rem; color: #111; }
        .merch-price { color: var(--accent); font-weight: bold; margin: 5px 0 15px; display: block; font-family: sans-serif; }

        .tour-list { width: 100%; margin-top: 20px; }
        .tour-row { display: grid; grid-template-columns: 100px 1fr 1fr 150px; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; font-family: sans-serif; }
        .tour-date { font-weight: bold; color: var(--accent); }
